<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./style.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>odin_battleship</title>
  </head>
  <body>
    <header class="header">
      <h1>Battleship</h1>
    </header>
    <main class="game-box">
      <div class="scoreboard">
        <div class="button-box">
          <button class="start">Begin battle</button>
          <button class="reset">Restart</button>
          <button class="randomize">Random deployment</button>
          <button class="rotate">Rotate ship</button>
        </div>
        <div class="status-box"></div>
      </div>
      <div class="arena">
        <div class="ally-board">
        </div>
        <div class="foe-board">
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
